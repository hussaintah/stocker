{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span>📈</span> Stocker</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Start with $1,00,000 virtual balance</p>

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="johndoe" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required minlength="6"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
